    <script type="module">
        import 'https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.0.1/dist/cookieconsent.umd.js';

        CookieConsent.run({
            guiOptions: {
                consentModal: {
                    layout: 'box',
                    position: 'bottom right',
                    equalWeightButtons: true,
                    flipButtons: false
                },
                preferencesModal: {
                    layout: 'box',
                    position: 'right',
                    equalWeightButtons: true,
                    flipButtons: false
                }
            },
            categories: {
                necessary: { readOnly: true },
                analytics: {},
                marketing: {}
            },
            language: {
                default: 'pl',
                autoDetect: 'browser',
                translations: {
                    pl: {
                        consentModal: {
                            title: 'Szanujemy Twoją prywatność',
                            description: 'Używamy plików cookies, aby zapewnić prawidłowe działanie strony systemtargowy.pl, analizować ruch oraz prowadzić działania reklamowe.',
                            acceptAllBtn: 'Akceptuj wszystkie',
                            acceptNecessaryBtn: 'Tylko niezbędne',
                            showPreferencesBtn: 'Zarządzaj opcjami',
                            footer: '<a href="../rodo/index.html" target="_blank">Polityka Prywatności</a>'
                        },
                        preferencesModal: {
                            title: 'Preferencje plików cookies',
                            acceptAllBtn: 'Akceptuj wszystkie',
                            acceptNecessaryBtn: 'Tylko niezbędne',
                            savePreferencesBtn: 'Zapisz ustawienia',
                            closeIconLabel: 'Zamknij okno',
                            sections: [
                                {
                                    title: 'Niezbędne pliki cookies',
                                    description: 'Wymagane do poprawnego działania strony internetowej. Nie mogą zostać wyłączone.',
                                    linkedCategory: 'necessary'
                                },
                                {
                                    title: 'Analityka',
                                    description: 'Pomagają nam zrozumieć, w jaki sposób odwiedzający korzystają ze strony (Google Analytics).',
                                    linkedCategory: 'analytics'
                                },
                                {
                                    title: 'Marketing',
                                    description: 'Służą do śledzenia użytkowników w celu wyświetlania trafniejszych reklam (Meta Pixel).',
                                    linkedCategory: 'marketing'
                                }
                            ]
                        }
                    }
                }
            },
            onConsent: function ({ cookie }) {
                let analyticsStatus = cookie.categories.includes('analytics') ? 'granted' : 'denied';
                let marketingStatus = cookie.categories.includes('marketing') ? 'granted' : 'denied';

                gtag('consent', 'update', { 'analytics_storage': analyticsStatus });
                gtag('consent', 'update', {
                    'ad_storage': marketingStatus,
                    'ad_user_data': marketingStatus,
                    'ad_personalization': marketingStatus
                });

                dataLayer.push({
                    'event': 'consent_ready',
                    'consent_analytics': analyticsStatus,
                    'consent_marketing': marketingStatus
                });
            },
            onChange: function ({ cookie, changedCategories }) {
                let analyticsStatus = cookie.categories.includes('analytics') ? 'granted' : 'denied';
                let marketingStatus = cookie.categories.includes('marketing') ? 'granted' : 'denied';

                gtag('consent', 'update', { 'analytics_storage': analyticsStatus });
                gtag('consent', 'update', {
                    'ad_storage': marketingStatus,
                    'ad_user_data': marketingStatus,
                    'ad_personalization': marketingStatus
                });

                dataLayer.push({
                    'event': 'consent_update',
                    'consent_analytics': analyticsStatus,
                    'consent_marketing': marketingStatus
                });

                if (changedCategories.includes('analytics') && analyticsStatus === 'denied') {
                    document.cookie.split(";").forEach(function (c) {
                        let name = c.trim().split("=")[0];
                        if (name.startsWith('_ga') || name.startsWith('_gid')) {
                            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=." + window.location.hostname.replace('www.', '') + ";";
                        }
                    });
                }
                if (changedCategories.includes('marketing') && marketingStatus === 'denied') {
                    document.cookie.split(";").forEach(function (c) {
                        let name = c.trim().split("=")[0];
                        if (name.startsWith('_fbp') || name.startsWith('_gcl')) {
                            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                            document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=." + window.location.hostname.replace('www.', '') + ";";
                        }
                    });
                }
            }
        });
